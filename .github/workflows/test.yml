name: Cypress Test
on:
  push:
    branches: [main,MRP_E2E, MS-204-implement-cypress-automated-tests-against-purple]
jobs:
  install: 
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cypress install
        uses: actions/setup-node@v3
        with:
          node-version: 20
          # Disable running of tests within install job
          runTests: false
          build: npm install --force

      # - name: Save build folder
      #   uses: actions/upload-artifact@v3
      #   with:
      #     name: build
      #     if-no-files-found: error
      #     path: dist

  test:
    runs-on: ubuntu-latest
    needs: install
    strategy:
      # don't fail the entire matrix on failure
      fail-fast: false
      matrix:
        # run copies of the current job in parallel
        containers: [1]    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install OpenVPN
        run: |
          sudo apt-get update
          sudo apt-get --assume-yes --no-install-recommends install openvpn          
      - name: Setup VPN config
        run: |
          echo "${{ secrets.CA_CRT }}" > ca.crt
          echo "${{ secrets.USER_CRT }}" > user.crt
          echo "${{ secrets.USER_KEY }}" > user.key
          echo "${{ secrets.SECRET_USERNAME_PASSWORD }}" > secret.txt
          echo "${{ secrets.TLS_KEY }}" > tls.key          

      - name: Connect VPN
        run: sudo openvpn --config ".github/vpn/client.ovpn" --log "vpn.log" --daemon

      - name: Check Connect VPN
        run: echo ${{ steps.connect_vpn.outputs.STATUS }}

      - name: Wait for a VPN connection
        timeout-minutes: 1
        run: until ping -c1 10.0.1.168; do sleep 2; done
    
      - name: Node v20 Install
        uses: actions/setup-node@v3
        with:
          node-version: 20
      - name: Clean cache
        run: npm cache clean --force         
      - name: Install dependencies
        run: npm install --force
      - name: Check Cypress install
        run: npx cypress version  
      - name: Run Cypress tests
        env:
          SUPER_SECRET: ${{secrets.CYPRESS_KEY}}        
        run: npx cypress run --record --key ${{ secrets.CYPRESS_KEY }} --env grep="[PURPLE]" --tag "PURPLE"
        
      - name: Kill VPN connection
        if: always()
        run: |
          sudo chmod 777 vpn.log
          sudo killall openvpn            
